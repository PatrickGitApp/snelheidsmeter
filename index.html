<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0d1117">
<title>Snelheidsmeter</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-512.png">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0d1117; --surface: #161b22; --border: #30363d;
  --accent: #00d4aa; --accent2: #ff6b35;
  --text: #e6edf3; --muted: #8b949e;
  --danger: #f85149; --warn: #f0a500;
  --mono: 'Courier New', monospace;
}
body {
  background: var(--bg); color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  height: 100dvh; display: flex; flex-direction: column; overflow: hidden;
}

/* HEADER */
header {
  background: var(--surface); border-bottom: 1px solid var(--border);
  padding: 8px 14px; display: flex; align-items: center;
  justify-content: space-between; flex-shrink: 0; gap: 8px;
}
header h1 { font-size: 15px; font-weight: 700; letter-spacing:.08em; text-transform:uppercase; color:var(--accent); }
#status-dot {
  width:10px; height:10px; border-radius:50%; background:var(--muted); transition:background .4s; flex-shrink:0;
}
#status-dot.active  { background:var(--accent); box-shadow:0 0 8px var(--accent); animation:pulse 1.5s infinite; }
#status-dot.waiting { background:var(--warn); box-shadow:0 0 8px var(--warn); }
@keyframes pulse { 0%,100%{opacity:1}50%{opacity:.4} }

/* SPEED PANEL */
#speed-panel {
  background: var(--surface); border-bottom: 1px solid var(--border);
  padding: 8px 14px; display: flex; align-items: center;
  justify-content: space-between; flex-shrink: 0; transition: background .4s;
}
#speed-panel.over-limit { background: rgba(248,81,73,.18); border-bottom-color: var(--danger); }

.speed-main { display:flex; align-items:baseline; gap:6px; }
#speed-value {
  font-family: var(--mono); font-size: 56px; font-weight: 700;
  color: var(--accent); line-height:1; transition: color .3s;
}
#speed-value.over { color: var(--danger); }
.speed-unit { font-size:13px; color:var(--muted); text-transform:uppercase; letter-spacing:.1em; }

.stats-mini { display:flex; flex-direction:column; align-items:flex-end; gap:3px; }
.stat-item  { font-size:11px; color:var(--muted); text-align:right; }
.stat-item span { color:var(--text); font-family:var(--mono); font-weight:600; }

/* LIMIT BAR */
#limit-bar {
  background: var(--bg); border-bottom: 1px solid var(--border);
  padding: 6px 14px; display: flex; align-items: center;
  gap: 10px; flex-shrink: 0;
}

.road-sign {
  width: 44px; height: 44px; border-radius: 50%;
  border: 4px solid var(--danger); background: white;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--mono); font-weight: 900; font-size: 14px;
  color: #111; flex-shrink: 0; position: relative; transition: all .3s;
}
.road-sign.unknown { border-color: var(--muted); color: var(--muted); background: var(--surface); font-size:18px; }
.road-sign.custom  { border-color: var(--warn); }

#limit-info { flex:1; min-width:0; }
#limit-source { font-size:11px; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
#limit-road   { font-size:12px; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-top:1px; }

#btn-custom-limit {
  background: var(--surface); border: 1px solid var(--border);
  color: var(--muted); font-size: 11px; padding: 4px 9px;
  border-radius: 6px; cursor: pointer; white-space: nowrap; flex-shrink:0;
}
#btn-custom-limit:active { background: var(--border); }

/* CUSTOM LIMIT MODAL */
#modal-overlay {
  display:none; position:fixed; inset:0; background:rgba(0,0,0,.7);
  z-index:5000; align-items:center; justify-content:center;
}
#modal-overlay.show { display:flex; }
#modal {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 16px; padding: 24px 20px; width: 280px; text-align:center;
}
#modal h2 { font-size:16px; color:var(--text); margin-bottom:6px; }
#modal p  { font-size:12px; color:var(--muted); margin-bottom:16px; }
.limit-options { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:16px; }
.limit-opt {
  padding: 10px 4px; border-radius: 8px; border: 2px solid var(--border);
  background: var(--bg); color: var(--text); font-family:var(--mono);
  font-size: 15px; font-weight:700; cursor:pointer; transition: all .15s;
}
.limit-opt:active, .limit-opt.selected { border-color:var(--accent); color:var(--accent); background:rgba(0,212,170,.1); }
#custom-input-row { display:flex; gap:8px; margin-bottom:16px; }
#custom-kmh {
  flex:1; background:var(--bg); border:1px solid var(--border); border-radius:8px;
  color:var(--text); font-size:18px; font-family:var(--mono); padding:8px 12px;
  text-align:center;
}
.modal-btns { display:flex; gap:8px; }
.modal-btn {
  flex:1; padding:11px; border-radius:8px; font-size:14px;
  font-weight:700; cursor:pointer; border:none;
}
#btn-modal-cancel { background:var(--border); color:var(--muted); }
#btn-modal-ok     { background:var(--accent); color:#0d1117; }
#btn-modal-clear  { background:var(--surface); color:var(--danger); border:1px solid var(--danger); flex:0 0 auto; padding:11px 14px; border-radius:8px; font-size:13px; font-weight:700; cursor:pointer; }

/* MAP */
#map { flex:1; min-height:0; }

/* COUNTDOWN */
#countdown-bar { height:3px; background:var(--border); flex-shrink:0; overflow:hidden; }
#countdown-fill { height:100%; background:var(--accent); width:0%; transition:width .5s linear; }

/* LOG */
#log-panel { background:var(--surface); border-top:1px solid var(--border); height:120px; overflow-y:auto; flex-shrink:0; }
#log-header {
  padding:5px 12px; font-size:11px; text-transform:uppercase; letter-spacing:.1em;
  color:var(--muted); border-bottom:1px solid var(--border); background:var(--bg);
  position:sticky; top:0; display:flex; justify-content:space-between; align-items:center;
}
#log-header button { background:none; border:1px solid var(--border); color:var(--muted); font-size:10px; padding:2px 8px; border-radius:4px; cursor:pointer; }
#log-list { padding:2px 0; }
.log-row {
  display:grid; grid-template-columns:60px 1fr 1fr 22px;
  align-items:center; padding:3px 12px; font-size:11px;
  border-bottom:1px solid #1c2128; animation:fadeIn .3s ease; gap:4px;
}
.log-row.speeding { background:rgba(248,81,73,.1); }
@keyframes fadeIn { from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)} }
.log-time  { color:var(--muted); font-family:var(--mono); }
.log-speed { font-family:var(--mono); font-weight:700; color:var(--accent); }
.log-speed.over { color:var(--danger); }
.log-limit { font-size:10px; color:var(--muted); font-family:var(--mono); }
.log-flag  { font-size:13px; text-align:right; }

/* CONTROLS */
#controls {
  background:var(--bg); border-top:1px solid var(--border);
  padding:8px 14px; display:flex; gap:8px; flex-shrink:0;
}
button.btn {
  flex:1; padding:12px; border:none; border-radius:8px;
  font-size:14px; font-weight:700; letter-spacing:.05em; cursor:pointer; transition:all .15s;
}
#btn-start { background:var(--accent); color:#0d1117; }
#btn-start:active { transform:scale(.97); }
#btn-start.running { background:var(--danger); color:#fff; }
#btn-center { background:var(--surface); color:var(--text); border:1px solid var(--border); flex:0 0 auto; padding:12px 14px; }

/* ALERT OVERLAY */
#alert-overlay {
  display:none; position:fixed; inset:0; background:rgba(248,81,73,.2);
  z-index:9999; pointer-events:none; border:4px solid var(--danger);
  animation:flashBorder .5s ease-in-out infinite alternate;
}
#alert-overlay.show { display:block; }
@keyframes flashBorder { from{border-color:rgba(248,81,73,.5)}to{border-color:var(--danger)} }

/* TOAST */
#toast {
  position:fixed; top:68px; left:50%; transform:translateX(-50%) translateY(-16px);
  background:var(--danger); color:#fff; font-weight:700; font-size:14px;
  padding:9px 18px; border-radius:30px; z-index:10000; opacity:0;
  transition:opacity .3s, transform .3s; pointer-events:none;
  white-space:nowrap; box-shadow:0 4px 20px rgba(248,81,73,.5);
}
#toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
#toast.warn  { background:var(--warn); box-shadow:0 4px 20px rgba(240,165,0,.5); }

/* Leaflet */
.leaflet-container { background:#1a1f29 !important; }
.leaflet-tile { filter:brightness(.85) saturate(.9); }
.speed-marker {
  background:var(--accent); color:#0d1117; font-size:11px; font-weight:700;
  font-family:var(--mono); padding:2px 6px; border-radius:10px;
  white-space:nowrap; border:2px solid rgba(255,255,255,.3); box-shadow:0 2px 6px rgba(0,0,0,.5);
}
.speed-marker.over { background:var(--danger); color:#fff; }
.pos-marker {
  width:18px; height:18px; border-radius:50%;
  background:var(--accent2); border:3px solid white; box-shadow:0 0 12px var(--accent2);
}
</style>
</head>
<body>

<div id="alert-overlay"></div>
<div id="toast"></div>

<!-- CUSTOM LIMIT MODAL -->
<div id="modal-overlay">
  <div id="modal">
    <h2>Eigen snelheidslimiet</h2>
    <p>Kies een limiet of typ zelf een waarde. Wis om OSM weer te gebruiken.</p>
    <div class="limit-options">
      <button class="limit-opt" onclick="selectLimitOpt(30)">30</button>
      <button class="limit-opt" onclick="selectLimitOpt(50)">50</button>
      <button class="limit-opt" onclick="selectLimitOpt(60)">60</button>
      <button class="limit-opt" onclick="selectLimitOpt(80)">80</button>
      <button class="limit-opt" onclick="selectLimitOpt(100)">100</button>
      <button class="limit-opt" onclick="selectLimitOpt(120)">120</button>
    </div>
    <div id="custom-input-row">
      <input id="custom-kmh" type="number" min="1" max="200" placeholder="Eigen waarde…">
    </div>
    <div class="modal-btns">
      <button class="modal-btn" id="btn-modal-cancel" onclick="closeModal()">Annuleer</button>
      <button class="modal-btn" id="btn-modal-clear"  onclick="clearCustomLimit()">Wis</button>
      <button class="modal-btn" id="btn-modal-ok"     onclick="applyCustomLimit()">OK</button>
    </div>
  </div>
</div>

<header>
  <h1>⚡ Snelheidsmeter</h1>
  <div id="status-dot"></div>
</header>

<div id="speed-panel">
  <div class="speed-main">
    <div id="speed-value">--</div>
    <div class="speed-unit">km/h</div>
  </div>
  <div class="stats-mini">
    <div class="stat-item">Max: <span id="max-speed">--</span> km/h</div>
    <div class="stat-item">Gem: <span id="avg-speed">--</span> km/h</div>
    <div class="stat-item">Metingen: <span id="count">0</span></div>
  </div>
</div>

<div id="limit-bar">
  <div class="road-sign unknown" id="road-sign">?</div>
  <div id="limit-info">
    <div id="limit-source">Nog geen GPS-fix</div>
    <div id="limit-road">—</div>
  </div>
  <button id="btn-custom-limit" onclick="openModal()">✏️ Eigen limiet</button>
</div>

<div id="map"></div>
<div id="countdown-bar"><div id="countdown-fill"></div></div>

<div id="log-panel">
  <div id="log-header">
    <span>📋 Snelheidslog</span>
    <button onclick="exportLog()">Exporteer CSV</button>
  </div>
  <div id="log-list"></div>
</div>

<div id="controls">
  <button class="btn" id="btn-start" onclick="toggleTracking()">▶ Start</button>
  <button class="btn" id="btn-center" onclick="centerMap()">📍</button>
</div>

<script>
// ═══════════════════════════════════════════
//  CONFIG
// ═══════════════════════════════════════════
const INTERVAL = 15; // seconds between readings

// ═══════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════
let map, posMarker, polyline;
let pathCoords = [], logMarkers = [], readings = [];
let watchId = null, intervalTimer = null, countdownTimer = null;
let isRunning = false, lastPosition = null, countdown = 0;
let alertActive = false, toastTimer = null;
let audioCtx = null;

// Limit state
let osmLimit      = null;   // fetched from OSM (number or null)
let customLimit   = null;   // user override (number or null)
let limitRoadName = '';
let fetchingLimit = false;
let pendingLimitOpt = null;

function activeLimit() {
  return customLimit !== null ? customLimit : osmLimit;
}

// ═══════════════════════════════════════════
//  MAP
// ═══════════════════════════════════════════
map = L.map('map', { zoomControl: true, attributionControl: false });
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(map);
const posIcon = L.divIcon({ className:'', html:'<div class="pos-marker"></div>', iconSize:[18,18], iconAnchor:[9,9] });
posMarker = L.marker([52.3,4.9], { icon: posIcon }).addTo(map);
polyline  = L.polyline([], { color:'#00d4aa', weight:3, opacity:.8 }).addTo(map);

// ═══════════════════════════════════════════
//  OSM SPEED LIMIT
// ═══════════════════════════════════════════
async function fetchSpeedLimit(lat, lon) {
  if (fetchingLimit) return;
  fetchingLimit = true;

  // Only query OSM if no custom limit set
  if (customLimit !== null) {
    fetchingLimit = false;
    return;
  }

  const r = 30; // search radius in metres
  const query = `
    [out:json][timeout:8];
    way(around:${r},${lat},${lon})[highway][highway!~"footway|cycleway|path|steps|pedestrian"];
    out tags 1;
  `;
  const url = 'https://overpass-api.de/api/interpreter?data=' + encodeURIComponent(query);

  try {
    const res  = await fetch(url, { signal: AbortSignal.timeout(9000) });
    const data = await res.json();

    let limit = null;
    let road  = '';

    if (data.elements && data.elements.length > 0) {
      const way = data.elements[0].tags || {};
      road = way.name || way.ref || way.highway || '';

      const ms = way.maxspeed;
      if (ms) {
        if (/^\d+$/.test(ms.trim())) {
          limit = parseInt(ms);
        } else if (ms === 'NL:urban')     limit = 50;
        else if (ms === 'NL:rural')       limit = 80;
        else if (ms === 'NL:motorway')    limit = 100;
        else if (ms === 'NL:living_street') limit = 15;
        else if (ms === 'walk')           limit = 15;
      }

      // Fallback inference from road type when no maxspeed tag
      if (!limit && way.highway) {
        const hw = way.highway;
        if      (hw === 'motorway')           limit = 100;
        else if (hw === 'motorway_link')      limit = 100;
        else if (hw === 'trunk')              limit = 100;
        else if (hw === 'trunk_link')         limit = 80;
        else if (hw === 'primary')            limit = 80;
        else if (hw === 'secondary')          limit = 80;
        else if (hw === 'tertiary')           limit = 50;
        else if (hw === 'residential')        limit = 30;
        else if (hw === 'living_street')      limit = 15;
        else if (hw === 'service')            limit = 15;
        else if (hw === 'unclassified')       limit = 60;
      }
    }

    osmLimit      = limit;
    limitRoadName = road;
    updateLimitUI();

  } catch (e) {
    // Keep previous limit on network error
    updateLimitUI(true);
  } finally {
    fetchingLimit = false;
  }
}

function updateLimitUI(networkErr = false) {
  const lim  = activeLimit();
  const sign  = document.getElementById('road-sign');
  const src   = document.getElementById('limit-source');
  const road  = document.getElementById('limit-road');

  if (lim !== null) {
    sign.textContent = lim;
    sign.className   = 'road-sign' + (customLimit !== null ? ' custom' : '');
    src.textContent  = customLimit !== null
      ? '✏️ Eigen limiet ingesteld'
      : networkErr ? '⚠️ Netwerk — vorige limiet' : '📡 OpenStreetMap';
    road.textContent = limitRoadName || '—';
  } else {
    sign.textContent = '?';
    sign.className   = 'road-sign unknown';
    src.textContent  = networkErr ? '⚠️ Geen netwerk — limiet onbekend'
      : customLimit === null ? '📡 Geen limiet gevonden in OSM' : '';
    road.textContent = limitRoadName || '—';
  }
}

// ═══════════════════════════════════════════
//  MODAL — custom limit
// ═══════════════════════════════════════════
function openModal() {
  pendingLimitOpt = customLimit;
  document.getElementById('custom-kmh').value = customLimit || '';
  // Highlight matching button
  document.querySelectorAll('.limit-opt').forEach(b => {
    b.classList.toggle('selected', parseInt(b.textContent) === customLimit);
  });
  document.getElementById('modal-overlay').classList.add('show');
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('show');
}

function selectLimitOpt(val) {
  pendingLimitOpt = val;
  document.getElementById('custom-kmh').value = val;
  document.querySelectorAll('.limit-opt').forEach(b => {
    b.classList.toggle('selected', parseInt(b.textContent) === val);
  });
}

function applyCustomLimit() {
  const raw = parseInt(document.getElementById('custom-kmh').value);
  if (!isNaN(raw) && raw > 0 && raw <= 200) {
    customLimit = raw;
    updateLimitUI();
    showToast(`✏️ Eigen limiet: ${raw} km/h`, false);
  }
  closeModal();
}

function clearCustomLimit() {
  customLimit = null;
  updateLimitUI();
  showToast('🔄 Terug naar OSM-limieten', false);
  closeModal();
}

// ═══════════════════════════════════════════
//  AUDIO & ALERT
// ═══════════════════════════════════════════
function initAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

function beep(freq, dur, vol) {
  try {
    const osc  = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.type = 'square'; osc.frequency.value = freq;
    gain.gain.setValueAtTime(vol||.4, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(.001, audioCtx.currentTime + dur);
    osc.start(audioCtx.currentTime); osc.stop(audioCtx.currentTime + dur);
  } catch(e) {}
}

function playAlarm() {
  beep(880, .15, .5);
  setTimeout(() => beep(880, .15, .5), 200);
  setTimeout(() => beep(660, .25, .5), 400);
}

function triggerSpeedAlert(kmh, limit) {
  document.getElementById('alert-overlay').classList.add('show');
  setTimeout(() => document.getElementById('alert-overlay').classList.remove('show'), 2500);
  showToast(`🚨 Te snel! ${kmh} km/h (limiet ${limit})`, true);
  playAlarm();
  if (navigator.vibrate) navigator.vibrate([200,100,200,100,400]);
}

function showToast(msg, danger) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className   = 'show' + (danger ? '' : ' warn');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.className = '', 3200);
}

// ═══════════════════════════════════════════
//  GPS
// ═══════════════════════════════════════════
function startGPS() {
  if (!navigator.geolocation) { alert('GPS niet beschikbaar.'); return; }
  document.getElementById('status-dot').className = 'waiting';
  watchId = navigator.geolocation.watchPosition(
    pos => {
      lastPosition = pos;
      document.getElementById('status-dot').className = 'active';
      updateLiveSpeed(pos);
      updateMapPosition(pos);
    },
    err => { document.getElementById('status-dot').className = ''; },
    { enableHighAccuracy: true, maximumAge: 2000, timeout: 10000 }
  );
}

function stopGPS() {
  if (watchId !== null) { navigator.geolocation.clearWatch(watchId); watchId = null; }
  document.getElementById('status-dot').className = '';
}

// ═══════════════════════════════════════════
//  LIVE SPEED
// ═══════════════════════════════════════════
function updateLiveSpeed(pos) {
  const kmh = pos.coords.speed != null ? pos.coords.speed * 3.6 : null;
  const el  = document.getElementById('speed-value');
  const pan = document.getElementById('speed-panel');
  if (kmh === null) return;

  const rounded = Math.round(kmh);
  el.textContent = rounded;

  const lim   = activeLimit();
  const isOver = lim !== null && rounded > lim;
  el.className  = isOver ? 'over' : '';
  pan.className = isOver ? 'over-limit' : '';

  if (isOver && !alertActive) {
    alertActive = true;
    triggerSpeedAlert(rounded, lim);
    setTimeout(() => { alertActive = false; }, 5000);
  } else if (!isOver) {
    alertActive = false;
  }
}

function updateMapPosition(pos) {
  const ll = [pos.coords.latitude, pos.coords.longitude];
  posMarker.setLatLng(ll);
  pathCoords.push(ll);
  polyline.setLatLngs(pathCoords);
}

// ═══════════════════════════════════════════
//  READING (every 15s)
// ═══════════════════════════════════════════
async function takeReading() {
  if (!lastPosition) return;
  const pos  = lastPosition;
  const kmh  = pos.coords.speed != null ? Math.round(pos.coords.speed * 3.6) : 0;
  const lat  = pos.coords.latitude;
  const lon  = pos.coords.longitude;
  const now  = new Date();
  const time = now.toLocaleTimeString('nl-NL',{hour:'2-digit',minute:'2-digit',second:'2-digit'});

  // Fetch OSM limit in parallel with recording
  await fetchSpeedLimit(lat, lon);

  const lim      = activeLimit();
  const speeding = lim !== null && kmh > lim;
  const limitStr = lim !== null ? lim + ' km/h' : '?';

  readings.push({ time, kmh, lat, lon, limit: lim, speeding, timestamp: now });
  updateStats();
  addLogRow(time, kmh, limitStr, speeding);
  addMapMarker(lat, lon, kmh, speeding);

  if (speeding) triggerSpeedAlert(kmh, lim);
}

function updateStats() {
  const spds = readings.map(r => r.kmh);
  document.getElementById('max-speed').textContent = Math.max(...spds);
  document.getElementById('avg-speed').textContent = Math.round(spds.reduce((a,b)=>a+b,0)/spds.length);
  document.getElementById('count').textContent     = readings.length;
}

function addLogRow(time, kmh, limitStr, speeding) {
  const list = document.getElementById('log-list');
  const row  = document.createElement('div');
  row.className = 'log-row' + (speeding ? ' speeding' : '');
  row.innerHTML = `
    <span class="log-time">${time}</span>
    <span class="log-speed ${speeding?'over':''}">${kmh} km/h</span>
    <span class="log-limit">lim: ${limitStr}</span>
    <span class="log-flag">${speeding?'🚨':'✅'}</span>
  `;
  list.insertBefore(row, list.firstChild);
}

function addMapMarker(lat, lon, kmh, speeding) {
  const icon = L.divIcon({
    className: '',
    html: `<div class="speed-marker ${speeding?'over':''}">${kmh}</div>`,
    iconAnchor: [20,10]
  });
  const m = L.marker([lat,lon], { icon }).addTo(map);
  m.bindPopup(`<b>${kmh} km/h</b>${speeding?' 🚨 Te snel!':''}`);
  logMarkers.push(m);
}

// ═══════════════════════════════════════════
//  COUNTDOWN BAR
// ═══════════════════════════════════════════
function startCountdown() {
  countdown = INTERVAL;
  const fill = document.getElementById('countdown-fill');
  fill.style.width = '100%';
  clearInterval(countdownTimer);
  countdownTimer = setInterval(() => {
    countdown--;
    fill.style.width = ((countdown/INTERVAL)*100) + '%';
    if (countdown <= 0) fill.style.width = '100%';
  }, 1000);
}

// ═══════════════════════════════════════════
//  TRACKING TOGGLE
// ═══════════════════════════════════════════
function toggleTracking() { isRunning ? stopTracking() : startTracking(); }

function startTracking() {
  initAudio();
  isRunning = true;
  const btn = document.getElementById('btn-start');
  btn.textContent = '⏹ Stop'; btn.className = 'btn running';

  startGPS();
  startCountdown();

  intervalTimer = setInterval(async () => {
    await takeReading();
    startCountdown();
  }, INTERVAL * 1000);
}

function stopTracking() {
  isRunning = false;
  clearInterval(intervalTimer); clearInterval(countdownTimer);
  stopGPS();
  alertActive = false;

  const btn = document.getElementById('btn-start');
  btn.textContent = '▶ Start'; btn.className = 'btn';

  document.getElementById('countdown-fill').style.width = '0%';
  document.getElementById('speed-value').textContent = '--';
  document.getElementById('speed-value').className   = '';
  document.getElementById('speed-panel').className   = '';
  document.getElementById('alert-overlay').classList.remove('show');
  document.getElementById('toast').className = '';
}

// ═══════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════
function centerMap() {
  if (lastPosition) {
    map.setView([lastPosition.coords.latitude, lastPosition.coords.longitude], 16);
  } else if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(p => map.setView([p.coords.latitude, p.coords.longitude], 14));
  }
}

function exportLog() {
  if (!readings.length) { alert('Nog geen metingen.'); return; }
  const lines = ['Tijd,Snelheid (km/h),Limiet (km/h),Lat,Lon,Te snel'];
  readings.forEach(r => lines.push(
    `${r.time},${r.kmh},${r.limit ?? ''},${r.lat},${r.lon},${r.speeding?'Ja':'Nee'}`
  ));
  const blob = new Blob([lines.join('\n')], { type:'text/csv' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = `snelheid_${new Date().toISOString().slice(0,10)}.csv`;
  a.click(); URL.revokeObjectURL(url);
}

// Service worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}

map.setView([52.1, 5.3], 8);
</script>

<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0d1117">
<title>Snelheidsmeter</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-512.png">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;--surface:#161b22;--border:#30363d;
  --accent:#00d4aa;--accent2:#ff6b35;
  --text:#e6edf3;--muted:#8b949e;
  --danger:#f85149;--warn:#f0a500;
  --mono:'Courier New',monospace;
}
html,body{height:100%;overflow:hidden}
body{
  background:var(--bg);color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  display:flex;flex-direction:column;height:100dvh;
}

/* ── HEADER ── */
header{
  background:var(--surface);border-bottom:1px solid var(--border);
  padding:6px 12px;display:flex;align-items:center;
  justify-content:space-between;flex-shrink:0;gap:8px;
}
header h1{font-size:14px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--accent)}
.header-right{display:flex;align-items:center;gap:10px}
#status-dot{width:10px;height:10px;border-radius:50%;background:var(--muted);transition:background .4s;flex-shrink:0}
#status-dot.active{background:var(--accent);box-shadow:0 0 8px var(--accent);animation:pulse 1.5s infinite}
#status-dot.waiting{background:var(--warn);box-shadow:0 0 8px var(--warn)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* tab buttons in header */
.tab-btns{display:flex;gap:4px}
.tab-btn{
  background:none;border:1px solid var(--border);color:var(--muted);
  font-size:11px;padding:3px 9px;border-radius:5px;cursor:pointer;
}
.tab-btn.active{background:var(--accent);color:#0d1117;border-color:var(--accent);font-weight:700}

/* ── MAIN LAYOUT ── */
#app{flex:1;display:flex;flex-direction:column;min-height:0;overflow:hidden}

/* Portrait: stacked. Landscape: side by side */
@media (orientation:landscape){
  #app{flex-direction:row}
  #left-col{width:58%;display:flex;flex-direction:column;border-right:1px solid var(--border)}
  #right-col{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden}
  #map{flex:1;min-height:0}
  #countdown-bar{height:3px}
}
@media (orientation:portrait){
  #left-col{display:contents}
  #right-col{display:contents}
  #map{flex:1;min-height:0}
}

/* ── SPEED PANEL ── */
#speed-panel{
  background:var(--surface);border-bottom:1px solid var(--border);
  padding:8px 12px;display:flex;align-items:center;
  justify-content:space-between;flex-shrink:0;transition:background .4s;
}
#speed-panel.over-limit{background:rgba(248,81,73,.18);border-bottom-color:var(--danger)}
.speed-main{display:flex;align-items:baseline;gap:5px}
#speed-value{
  font-family:var(--mono);font-size:64px;font-weight:700;
  color:var(--accent);line-height:1;transition:color .3s;
}
#speed-value.over{color:var(--danger)}
.speed-unit{font-size:14px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em}
.stats-mini{display:flex;flex-direction:column;align-items:flex-end;gap:3px}
.stat-item{font-size:11px;color:var(--muted);text-align:right}
.stat-item span{color:var(--text);font-family:var(--mono);font-weight:600}

/* ── LIMIT BAR ── */
#limit-bar{
  background:var(--bg);border-bottom:1px solid var(--border);
  padding:5px 12px;display:flex;align-items:center;gap:8px;flex-shrink:0;
}
.road-sign{
  width:48px;height:48px;border-radius:50%;
  border:4px solid var(--danger);background:white;
  display:flex;align-items:center;justify-content:center;
  font-family:var(--mono);font-weight:900;font-size:15px;
  color:#111;flex-shrink:0;transition:all .3s;
}
.road-sign.unknown{border-color:var(--muted);color:var(--muted);background:var(--surface);font-size:20px}
.road-sign.custom{border-color:var(--warn)}
#limit-info{flex:1;min-width:0}
#limit-source{font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#limit-road{font-size:12px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
#btn-custom-limit{
  background:var(--surface);border:1px solid var(--border);
  color:var(--muted);font-size:11px;padding:4px 8px;
  border-radius:6px;cursor:pointer;white-space:nowrap;flex-shrink:0;
}

/* ── CONTROLS ── */
#controls{
  background:var(--bg);border-top:1px solid var(--border);
  padding:8px 12px;display:flex;gap:8px;flex-shrink:0;
}
button.btn{
  flex:1;padding:11px;border:none;border-radius:8px;
  font-size:13px;font-weight:700;letter-spacing:.04em;cursor:pointer;transition:all .15s;
}
#btn-start{background:var(--accent);color:#0d1117}
#btn-start.running{background:var(--danger);color:#fff}
#btn-center{background:var(--surface);color:var(--text);border:1px solid var(--border);flex:0 0 auto;padding:11px 13px}

/* ── COUNTDOWN ── */
#countdown-bar{height:3px;background:var(--border);flex-shrink:0;overflow:hidden}
#countdown-fill{height:100%;background:var(--accent);width:0%;transition:width .5s linear}

/* ── TABS CONTENT ── */
#tab-live,#tab-archive{display:none;flex:1;flex-direction:column;min-height:0;overflow:hidden}
#tab-live.active,#tab-archive.active{display:flex}

/* ── LOG PANEL ── */
#log-panel{
  background:var(--surface);border-top:1px solid var(--border);
  flex:1;overflow-y:auto;min-height:0;
}
@media (orientation:portrait){#log-panel{max-height:130px}}
#log-header{
  padding:5px 12px;font-size:11px;text-transform:uppercase;letter-spacing:.1em;
  color:var(--muted);border-bottom:1px solid var(--border);background:var(--bg);
  position:sticky;top:0;display:flex;justify-content:space-between;align-items:center;gap:6px;
}
#log-header button{background:none;border:1px solid var(--border);color:var(--muted);font-size:10px;padding:2px 7px;border-radius:4px;cursor:pointer}
#log-list{padding:2px 0}
.log-row{
  display:grid;grid-template-columns:58px 1fr 1fr 20px;
  align-items:center;padding:3px 12px;font-size:11px;
  border-bottom:1px solid #1c2128;animation:fadeIn .3s ease;gap:3px;
}
.log-row.speeding{background:rgba(248,81,73,.1)}
@keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
.log-time{color:var(--muted);font-family:var(--mono)}
.log-speed{font-family:var(--mono);font-weight:700;color:var(--accent)}
.log-speed.over{color:var(--danger)}
.log-limit{font-size:10px;color:var(--muted);font-family:var(--mono)}
.log-flag{font-size:12px;text-align:right}

/* ── ARCHIVE TAB ── */
#archive-panel{flex:1;display:flex;flex-direction:column;min-height:0;overflow:hidden}
#archive-toolbar{
  padding:8px 12px;display:flex;gap:8px;align-items:center;flex-shrink:0;
  background:var(--bg);border-bottom:1px solid var(--border);
}
#archive-toolbar button{
  background:var(--surface);border:1px solid var(--border);color:var(--text);
  font-size:12px;padding:5px 10px;border-radius:6px;cursor:pointer;white-space:nowrap;
}
#archive-toolbar button.primary{background:var(--accent);color:#0d1117;border-color:var(--accent);font-weight:700}
#trip-list{flex:1;overflow-y:auto;min-height:0}
.trip-item{
  padding:10px 12px;border-bottom:1px solid var(--border);
  display:flex;justify-content:space-between;align-items:center;cursor:pointer;
  transition:background .15s;
}
.trip-item:active,.trip-item.selected{background:rgba(0,212,170,.08)}
.trip-meta{flex:1;min-width:0}
.trip-name{font-size:13px;font-weight:600;color:var(--text)}
.trip-info{font-size:11px;color:var(--muted);margin-top:2px}
.trip-badge{font-size:11px;font-family:var(--mono);color:var(--accent);flex-shrink:0;text-align:right}
.trip-badge.has-speeding{color:var(--danger)}
.trip-actions{display:flex;gap:6px;margin-left:8px}
.trip-del{background:none;border:none;color:var(--muted);font-size:16px;cursor:pointer;padding:2px 4px}
#archive-map-wrap{flex:1;min-height:0;position:relative;display:none}
#archive-map-wrap.show{display:block}
#archive-map{width:100%;height:100%}
#archive-back{
  position:absolute;top:10px;left:10px;z-index:1000;
  background:var(--surface);border:1px solid var(--border);color:var(--text);
  font-size:12px;padding:6px 12px;border-radius:8px;cursor:pointer;
  box-shadow:0 2px 8px rgba(0,0,0,.4);
}
#no-trips{padding:32px 20px;text-align:center;color:var(--muted);font-size:13px}

/* ── MODALS ── */
.modal-overlay{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);
  z-index:5000;align-items:center;justify-content:center;
}
.modal-overlay.show{display:flex}
.modal{
  background:var(--surface);border:1px solid var(--border);
  border-radius:16px;padding:22px 18px;width:300px;text-align:center;
}
.modal h2{font-size:16px;color:var(--text);margin-bottom:6px}
.modal p{font-size:12px;color:var(--muted);margin-bottom:14px}
.limit-options{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:14px}
.limit-opt{
  padding:9px 4px;border-radius:8px;border:2px solid var(--border);
  background:var(--bg);color:var(--text);font-family:var(--mono);
  font-size:15px;font-weight:700;cursor:pointer;transition:all .15s;
}
.limit-opt.selected{border-color:var(--accent);color:var(--accent);background:rgba(0,212,170,.1)}
#custom-kmh{
  width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;
  color:var(--text);font-size:18px;font-family:var(--mono);padding:8px 12px;
  text-align:center;margin-bottom:14px;
}
.modal-btns{display:flex;gap:8px}
.modal-btn{flex:1;padding:10px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;border:none}
.modal-btn.cancel{background:var(--border);color:var(--muted)}
.modal-btn.ok{background:var(--accent);color:#0d1117}
.modal-btn.danger{background:none;border:1px solid var(--danger);color:var(--danger);flex:0 0 auto;padding:10px 13px}

/* ── ALERT / TOAST ── */
#alert-overlay{
  display:none;position:fixed;inset:0;background:rgba(248,81,73,.2);
  z-index:9999;pointer-events:none;border:4px solid var(--danger);
  animation:flashBorder .5s ease-in-out infinite alternate;
}
#alert-overlay.show{display:block}
@keyframes flashBorder{from{border-color:rgba(248,81,73,.5)}to{border-color:var(--danger)}}
#toast{
  position:fixed;top:52px;left:50%;transform:translateX(-50%) translateY(-14px);
  background:var(--danger);color:#fff;font-weight:700;font-size:13px;
  padding:8px 16px;border-radius:30px;z-index:10000;opacity:0;
  transition:opacity .3s,transform .3s;pointer-events:none;
  white-space:nowrap;box-shadow:0 4px 18px rgba(248,81,73,.5);
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.warn{background:var(--warn);box-shadow:0 4px 18px rgba(240,165,0,.5)}

/* Leaflet */
.leaflet-container{background:#1a1f29 !important}
.leaflet-tile{filter:brightness(.85) saturate(.9)}
.speed-marker{
  background:var(--accent);color:#0d1117;font-size:11px;font-weight:700;
  font-family:var(--mono);padding:2px 6px;border-radius:10px;
  white-space:nowrap;border:2px solid rgba(255,255,255,.3);box-shadow:0 2px 6px rgba(0,0,0,.5);
}
.speed-marker.over{background:var(--danger);color:#fff}
.pos-marker{width:18px;height:18px;border-radius:50%;background:var(--accent2);border:3px solid white;box-shadow:0 0 12px var(--accent2)}
</style>
</head>
<body>

<div id="alert-overlay"></div>
<div id="toast"></div>

<!-- LIMIT MODAL -->
<div class="modal-overlay" id="modal-limit">
  <div class="modal">
    <h2>Eigen snelheidslimiet</h2>
    <p>Kies een limiet of typ zelf. Wis om OSM te gebruiken.</p>
    <div class="limit-options">
      <button class="limit-opt" onclick="selectLimitOpt(30)">30</button>
      <button class="limit-opt" onclick="selectLimitOpt(50)">50</button>
      <button class="limit-opt" onclick="selectLimitOpt(60)">60</button>
      <button class="limit-opt" onclick="selectLimitOpt(80)">80</button>
      <button class="limit-opt" onclick="selectLimitOpt(100)">100</button>
      <button class="limit-opt" onclick="selectLimitOpt(120)">120</button>
    </div>
    <input id="custom-kmh" type="number" min="1" max="200" placeholder="Eigen waarde…">
    <div class="modal-btns">
      <button class="modal-btn cancel" onclick="closeModal('modal-limit')">Annuleer</button>
      <button class="modal-btn danger" onclick="clearCustomLimit()">Wis</button>
      <button class="modal-btn ok" onclick="applyCustomLimit()">OK</button>
    </div>
  </div>
</div>

<!-- SAVE TRIP MODAL -->
<div class="modal-overlay" id="modal-save">
  <div class="modal">
    <h2>Rit opslaan</h2>
    <p>Geef deze rit een naam.</p>
    <input id="trip-name-input" type="text" placeholder="bijv. Woon-werk 12 jun"
      style="width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;
      color:var(--text);font-size:15px;padding:9px 12px;margin-bottom:14px;text-align:center;">
    <div class="modal-btns">
      <button class="modal-btn cancel" onclick="closeModal('modal-save')">Annuleer</button>
      <button class="modal-btn ok" onclick="confirmSaveTrip()">Opslaan</button>
    </div>
  </div>
</div>

<header>
  <h1>⚡ Snelheidsmeter</h1>
  <div class="header-right">
    <div class="tab-btns">
      <button class="tab-btn active" id="tab-btn-live"    onclick="switchTab('live')">Live</button>
      <button class="tab-btn"        id="tab-btn-archive" onclick="switchTab('archive')">Archief</button>
    </div>
    <div id="status-dot"></div>
  </div>
</header>

<div id="app">
  <!-- LEFT col (map) -->
  <div id="left-col">
    <div id="map"></div>
    <div id="countdown-bar"><div id="countdown-fill"></div></div>
  </div>

  <!-- RIGHT col (panels) -->
  <div id="right-col">

    <!-- LIVE TAB -->
    <div id="tab-live" class="active">
      <div id="speed-panel">
        <div class="speed-main">
          <div id="speed-value">--</div>
          <div class="speed-unit">km/h</div>
        </div>
        <div class="stats-mini">
          <div class="stat-item">Max: <span id="max-speed">--</span> km/h</div>
          <div class="stat-item">Gem: <span id="avg-speed">--</span> km/h</div>
          <div class="stat-item">Metingen: <span id="count">0</span></div>
        </div>
      </div>
      <div id="limit-bar">
        <div class="road-sign unknown" id="road-sign">?</div>
        <div id="limit-info">
          <div id="limit-source">Nog geen GPS-fix</div>
          <div id="limit-road">—</div>
        </div>
        <button id="btn-custom-limit" onclick="openModal('modal-limit')">✏️ Limiet</button>
      </div>
      <div id="log-panel">
        <div id="log-header">
          <span>📋 Log</span>
          <div style="display:flex;gap:5px">
            <button onclick="promptSaveTrip()">💾 Opslaan</button>
            <button onclick="exportLog()">⬇ CSV</button>
          </div>
        </div>
        <div id="log-list"></div>
      </div>
      <div id="controls">
        <button class="btn" id="btn-start" onclick="toggleTracking()">▶ Start</button>
        <button class="btn" id="btn-center" onclick="centerMap()">📍</button>
      </div>
    </div>

    <!-- ARCHIVE TAB -->
    <div id="tab-archive">
      <div id="archive-panel">
        <div id="archive-toolbar">
          <button class="primary" onclick="document.getElementById('csv-import').click()">⬆ CSV importeren</button>
          <input id="csv-import" type="file" accept=".csv" style="display:none" onchange="importCSV(event)">
          <button onclick="clearArchive()" style="color:var(--danger);border-color:var(--danger)">🗑 Alles wissen</button>
        </div>
        <div id="trip-list"><div id="no-trips">Nog geen ritten opgeslagen.<br>Start een rit en tik 💾 Opslaan.</div></div>
        <div id="archive-map-wrap">
          <div id="archive-map"></div>
          <button id="archive-back" onclick="closeArchiveMap()">← Terug</button>
        </div>
      </div>
    </div>

  </div><!-- right-col -->
</div><!-- app -->

<script>
// ═══════════════════════════
//  CONFIG
// ═══════════════════════════
const INTERVAL = 15;
const STORAGE_KEY = 'snelheidsmeter_trips';

// ═══════════════════════════
//  STATE
// ═══════════════════════════
let map, archiveMap, posMarker, polyline;
let pathCoords=[], logMarkers=[], readings=[];
let watchId=null, intervalTimer=null, countdownTimer=null;
let isRunning=false, lastPosition=null, countdown=0;
let alertActive=false, toastTimer=null, audioCtx=null;
let osmLimit=null, customLimit=null, limitRoadName='', fetchingLimit=false;

function activeLimit(){ return customLimit!==null ? customLimit : osmLimit; }

// ═══════════════════════════
//  MAP (live)
// ═══════════════════════════
map = L.map('map',{zoomControl:true,attributionControl:false});
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19}).addTo(map);
const posIcon = L.divIcon({className:'',html:'<div class="pos-marker"></div>',iconSize:[18,18],iconAnchor:[9,9]});
posMarker = L.marker([52.3,4.9],{icon:posIcon}).addTo(map);
polyline  = L.polyline([],{color:'#00d4aa',weight:3,opacity:.8}).addTo(map);

// ═══════════════════════════
//  TABS
// ═══════════════════════════
function switchTab(name){
  document.getElementById('tab-live').classList.toggle('active', name==='live');
  document.getElementById('tab-archive').classList.toggle('active', name==='archive');
  document.getElementById('tab-btn-live').classList.toggle('active', name==='live');
  document.getElementById('tab-btn-archive').classList.toggle('active', name==='archive');
  if(name==='archive') renderTripList();
  setTimeout(()=>map.invalidateSize(),50);
}

// ═══════════════════════════
//  OSM LIMIT
// ═══════════════════════════
async function fetchSpeedLimit(lat,lon){
  if(fetchingLimit||customLimit!==null) return;
  fetchingLimit=true;
  const query=`[out:json][timeout:8];way(around:30,${lat},${lon})[highway][highway!~"footway|cycleway|path|steps|pedestrian"];out tags 1;`;
  try{
    const res=await fetch('https://overpass-api.de/api/interpreter?data='+encodeURIComponent(query),{signal:AbortSignal.timeout(9000)});
    const data=await res.json();
    let limit=null,road='';
    if(data.elements&&data.elements.length>0){
      const t=data.elements[0].tags||{};
      road=t.name||t.ref||t.highway||'';
      const ms=t.maxspeed;
      if(ms){
        if(/^\d+$/.test(ms.trim())) limit=parseInt(ms);
        else if(ms==='NL:urban') limit=50;
        else if(ms==='NL:rural') limit=80;
        else if(ms==='NL:motorway') limit=100;
        else if(ms==='NL:living_street') limit=15;
        else if(ms==='walk') limit=15;
      }
      if(!limit&&t.highway){
        const hw=t.highway;
        if(hw==='motorway'||hw==='motorway_link') limit=100;
        else if(hw==='trunk') limit=100;
        else if(hw==='trunk_link'||hw==='primary'||hw==='secondary') limit=80;
        else if(hw==='tertiary'||hw==='unclassified') limit=60;
        else if(hw==='residential') limit=30;
        else if(hw==='living_street'||hw==='service') limit=15;
      }
    }
    osmLimit=limit; limitRoadName=road; updateLimitUI();
  }catch(e){ updateLimitUI(true); }
  finally{ fetchingLimit=false; }
}

function updateLimitUI(err=false){
  const lim=activeLimit();
  const sign=document.getElementById('road-sign');
  const src=document.getElementById('limit-source');
  const road=document.getElementById('limit-road');
  if(lim!==null){
    sign.textContent=lim;
    sign.className='road-sign'+(customLimit!==null?' custom':'');
    src.textContent=customLimit!==null?'✏️ Eigen limiet':err?'⚠️ Netwerk — vorige limiet':'📡 OpenStreetMap';
  }else{
    sign.textContent='?'; sign.className='road-sign unknown';
    src.textContent=err?'⚠️ Geen netwerk':'📡 Geen limiet gevonden';
  }
  road.textContent=limitRoadName||'—';
}

// ═══════════════════════════
//  MODAL
// ═══════════════════════════
function openModal(id){ document.getElementById(id).classList.add('show'); }
function closeModal(id){ document.getElementById(id).classList.remove('show'); }

function selectLimitOpt(v){
  document.getElementById('custom-kmh').value=v;
  document.querySelectorAll('.limit-opt').forEach(b=>b.classList.toggle('selected',parseInt(b.textContent)===v));
}
function applyCustomLimit(){
  const v=parseInt(document.getElementById('custom-kmh').value);
  if(!isNaN(v)&&v>0&&v<=200){ customLimit=v; updateLimitUI(); showToast(`✏️ Eigen limiet: ${v} km/h`,false); }
  closeModal('modal-limit');
}
function clearCustomLimit(){ customLimit=null; updateLimitUI(); showToast('🔄 Terug naar OSM',false); closeModal('modal-limit'); }

// ═══════════════════════════
//  AUDIO & ALERT
// ═══════════════════════════
function initAudio(){ if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)(); }
function beep(freq,dur,vol){
  try{
    const o=audioCtx.createOscillator(),g=audioCtx.createGain();
    o.connect(g);g.connect(audioCtx.destination);
    o.type='square';o.frequency.value=freq;
    g.gain.setValueAtTime(vol||.4,audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(.001,audioCtx.currentTime+dur);
    o.start(audioCtx.currentTime);o.stop(audioCtx.currentTime+dur);
  }catch(e){}
}
function playAlarm(){ beep(880,.15,.5);setTimeout(()=>beep(880,.15,.5),200);setTimeout(()=>beep(660,.25,.5),400); }

function triggerSpeedAlert(kmh,lim){
  document.getElementById('alert-overlay').classList.add('show');
  setTimeout(()=>document.getElementById('alert-overlay').classList.remove('show'),2500);
  showToast(`🚨 Te snel! ${kmh} km/h (limiet ${lim})`,true);
  playAlarm();
  if(navigator.vibrate) navigator.vibrate([200,100,200,100,400]);
}
function showToast(msg,danger){
  const t=document.getElementById('toast');
  t.textContent=msg; t.className='show'+(danger?'':' warn');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.className='',3200);
}

// ═══════════════════════════
//  GPS
// ═══════════════════════════
function startGPS(){
  if(!navigator.geolocation){alert('GPS niet beschikbaar.');return;}
  document.getElementById('status-dot').className='waiting';
  watchId=navigator.geolocation.watchPosition(
    pos=>{ lastPosition=pos; document.getElementById('status-dot').className='active'; updateLiveSpeed(pos); updateMapPosition(pos); },
    ()=>{ document.getElementById('status-dot').className=''; },
    {enableHighAccuracy:true,maximumAge:2000,timeout:10000}
  );
}
function stopGPS(){
  if(watchId!==null){navigator.geolocation.clearWatch(watchId);watchId=null;}
  document.getElementById('status-dot').className='';
}

// ═══════════════════════════
//  LIVE SPEED
// ═══════════════════════════
function updateLiveSpeed(pos){
  const kmh=pos.coords.speed!=null?pos.coords.speed*3.6:null;
  if(kmh===null) return;
  const rounded=Math.round(kmh);
  const el=document.getElementById('speed-value');
  const pan=document.getElementById('speed-panel');
  el.textContent=rounded;
  const lim=activeLimit(), isOver=lim!==null&&rounded>lim;
  el.className=isOver?'over':'';
  pan.className=isOver?'over-limit':'';
  if(isOver&&!alertActive){ alertActive=true; triggerSpeedAlert(rounded,lim); setTimeout(()=>alertActive=false,5000); }
  else if(!isOver) alertActive=false;
}
function updateMapPosition(pos){
  const ll=[pos.coords.latitude,pos.coords.longitude];
  posMarker.setLatLng(ll); pathCoords.push(ll); polyline.setLatLngs(pathCoords);
}

// ═══════════════════════════
//  READING
// ═══════════════════════════
async function takeReading(){
  if(!lastPosition) return;
  const pos=lastPosition;
  const kmh=pos.coords.speed!=null?Math.round(pos.coords.speed*3.6):0;
  const lat=pos.coords.latitude, lon=pos.coords.longitude;
  const now=new Date();
  const time=now.toLocaleTimeString('nl-NL',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  await fetchSpeedLimit(lat,lon);
  const lim=activeLimit(), speeding=lim!==null&&kmh>lim;
  const limitStr=lim!==null?lim+' km/h':'?';
  readings.push({time,kmh,lat,lon,limit:lim,speeding,timestamp:now});
  updateStats(); addLogRow(time,kmh,limitStr,speeding); addMapMarker(lat,lon,kmh,speeding);
  if(speeding) triggerSpeedAlert(kmh,lim);
}
function updateStats(){
  const s=readings.map(r=>r.kmh);
  document.getElementById('max-speed').textContent=Math.max(...s);
  document.getElementById('avg-speed').textContent=Math.round(s.reduce((a,b)=>a+b,0)/s.length);
  document.getElementById('count').textContent=readings.length;
}
function addLogRow(time,kmh,limitStr,speeding){
  const list=document.getElementById('log-list');
  const row=document.createElement('div');
  row.className='log-row'+(speeding?' speeding':'');
  row.innerHTML=`<span class="log-time">${time}</span><span class="log-speed ${speeding?'over':''}">${kmh} km/h</span><span class="log-limit">lim:${limitStr}</span><span class="log-flag">${speeding?'🚨':'✅'}</span>`;
  list.insertBefore(row,list.firstChild);
}
function addMapMarker(lat,lon,kmh,speeding){
  const icon=L.divIcon({className:'',html:`<div class="speed-marker ${speeding?'over':''}">${kmh}</div>`,iconAnchor:[20,10]});
  const m=L.marker([lat,lon],{icon}).addTo(map);
  m.bindPopup(`<b>${kmh} km/h</b>${speeding?' 🚨 Te snel!':''}`);
  logMarkers.push(m);
}

// ═══════════════════════════
//  COUNTDOWN
// ═══════════════════════════
function startCountdown(){
  countdown=INTERVAL;
  const fill=document.getElementById('countdown-fill');
  fill.style.width='100%';
  clearInterval(countdownTimer);
  countdownTimer=setInterval(()=>{ countdown--; fill.style.width=((countdown/INTERVAL)*100)+'%'; if(countdown<=0) fill.style.width='100%'; },1000);
}

// ═══════════════════════════
//  TRACKING
// ═══════════════════════════
function toggleTracking(){ isRunning?stopTracking():startTracking(); }
function startTracking(){
  initAudio(); isRunning=true;
  const btn=document.getElementById('btn-start');
  btn.textContent='⏹ Stop'; btn.className='btn running';
  startGPS(); startCountdown();
  intervalTimer=setInterval(async()=>{ await takeReading(); startCountdown(); },INTERVAL*1000);
}
function stopTracking(){
  isRunning=false;
  clearInterval(intervalTimer); clearInterval(countdownTimer);
  stopGPS(); alertActive=false;
  const btn=document.getElementById('btn-start');
  btn.textContent='▶ Start'; btn.className='btn';
  document.getElementById('countdown-fill').style.width='0%';
  document.getElementById('speed-value').textContent='--';
  document.getElementById('speed-value').className='';
  document.getElementById('speed-panel').className='';
  document.getElementById('alert-overlay').classList.remove('show');
  document.getElementById('toast').className='';
}

// ═══════════════════════════
//  SAVE / ARCHIVE
// ═══════════════════════════
function loadTrips(){ try{ return JSON.parse(localStorage.getItem(STORAGE_KEY)||'[]'); }catch(e){ return []; } }
function saveTrips(trips){ localStorage.setItem(STORAGE_KEY,JSON.stringify(trips)); }

function promptSaveTrip(){
  if(!readings.length){ showToast('Nog geen metingen om op te slaan.',false); return; }
  const d=new Date();
  document.getElementById('trip-name-input').value=
    `Rit ${d.toLocaleDateString('nl-NL')} ${d.toLocaleTimeString('nl-NL',{hour:'2-digit',minute:'2-digit'})}`;
  openModal('modal-save');
}

function confirmSaveTrip(){
  const name=document.getElementById('trip-name-input').value.trim()||'Naamloze rit';
  const trips=loadTrips();
  const spds=readings.map(r=>r.kmh);
  trips.unshift({
    id: Date.now(),
    name,
    date: new Date().toISOString(),
    readings: readings.map(r=>({time:r.time,kmh:r.kmh,lat:r.lat,lon:r.lon,limit:r.limit,speeding:r.speeding})),
    maxSpeed: Math.max(...spds),
    avgSpeed: Math.round(spds.reduce((a,b)=>a+b,0)/spds.length),
    speedingCount: readings.filter(r=>r.speeding).length
  });
  saveTrips(trips);
  closeModal('modal-save');
  showToast(`💾 Rit "${name}" opgeslagen!`,false);
}

function renderTripList(){
  const trips=loadTrips();
  const list=document.getElementById('trip-list');
  const noTrips=document.getElementById('no-trips');
  if(!trips.length){ list.innerHTML=''; list.appendChild(noTrips); noTrips.style.display=''; return; }
  noTrips.style.display='none';
  list.innerHTML='';
  trips.forEach(trip=>{
    const item=document.createElement('div');
    item.className='trip-item';
    const d=new Date(trip.date).toLocaleDateString('nl-NL',{day:'numeric',month:'short',year:'numeric'});
    item.innerHTML=`
      <div class="trip-meta">
        <div class="trip-name">${trip.name}</div>
        <div class="trip-info">${d} · ${trip.readings.length} metingen · gem ${trip.avgSpeed} km/h</div>
      </div>
      <div class="trip-badge ${trip.speedingCount>0?'has-speeding':''}">${trip.maxSpeed} km/h max${trip.speedingCount>0?' 🚨':''}</div>
      <div class="trip-actions">
        <button class="trip-del" onclick="event.stopPropagation();deleteTrip(${trip.id})">🗑</button>
      </div>`;
    item.onclick=()=>showTripOnMap(trip);
    list.appendChild(item);
  });
}

function deleteTrip(id){
  const trips=loadTrips().filter(t=>t.id!==id);
  saveTrips(trips); renderTripList();
}

function clearArchive(){
  if(confirm('Alle opgeslagen ritten wissen?')){ localStorage.removeItem(STORAGE_KEY); renderTripList(); }
}

// ═══════════════════════════
//  ARCHIVE MAP
// ═══════════════════════════
let archiveMapInstance=null;

function showTripOnMap(trip){
  document.getElementById('archive-map-wrap').classList.add('show');
  document.getElementById('trip-list').style.display='none';
  document.getElementById('archive-toolbar').style.display='none';

  if(!archiveMapInstance){
    archiveMapInstance=L.map('archive-map',{zoomControl:true,attributionControl:false});
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19}).addTo(archiveMapInstance);
  }

  // Clear old layers
  archiveMapInstance.eachLayer(l=>{ if(l instanceof L.TileLayer) return; archiveMapInstance.removeLayer(l); });

  const pts=trip.readings.filter(r=>r.lat&&r.lon);
  if(!pts.length){ showToast('Geen GPS-punten in deze rit.',false); closeArchiveMap(); return; }

  const coords=pts.map(r=>[r.lat,r.lon]);
  L.polyline(coords,{color:'#00d4aa',weight:3,opacity:.8}).addTo(archiveMapInstance);

  pts.forEach(r=>{
    const icon=L.divIcon({className:'',html:`<div class="speed-marker ${r.speeding?'over':''}">${r.kmh}</div>`,iconAnchor:[20,10]});
    const m=L.marker([r.lat,r.lon],{icon}).addTo(archiveMapInstance);
    m.bindPopup(`<b>${r.time}</b><br>${r.kmh} km/h${r.limit?' (lim '+r.limit+')':''}${r.speeding?' 🚨':''}`);
  });

  // Start marker
  L.circleMarker(coords[0],{radius:8,color:'#00d4aa',fillColor:'#00d4aa',fillOpacity:1}).addTo(archiveMapInstance).bindPopup('Start');
  // End marker
  L.circleMarker(coords[coords.length-1],{radius:8,color:'#ff6b35',fillColor:'#ff6b35',fillOpacity:1}).addTo(archiveMapInstance).bindPopup('Einde');

  setTimeout(()=>{ archiveMapInstance.invalidateSize(); archiveMapInstance.fitBounds(L.latLngBounds(coords),{padding:[20,20]}); },100);
}

function closeArchiveMap(){
  document.getElementById('archive-map-wrap').classList.remove('show');
  document.getElementById('trip-list').style.display='';
  document.getElementById('archive-toolbar').style.display='';
}

// ═══════════════════════════
//  CSV IMPORT
// ═══════════════════════════
function importCSV(event){
  const file=event.target.files[0];
  if(!file) return;
  const reader=new FileReader();
  reader.onload=e=>{
    const lines=e.target.result.split('\n').filter(l=>l.trim());
    const header=lines[0].toLowerCase();
    if(!header.includes('snelheid')&&!header.includes('speed')&&!header.includes('kmh')){
      showToast('Ongeldig CSV-formaat.',true); return;
    }
    const rows=[];
    for(let i=1;i<lines.length;i++){
      const parts=lines[i].split(',');
      if(parts.length<4) continue;
      // Support both app-export format and generic: time, kmh, limit, lat, lon, speeding
      const time=parts[0]?.trim()||'';
      const kmh=parseFloat(parts[1])||0;
      const limitOrLat=parseFloat(parts[2]);
      const lat=parseFloat(parts[3]);
      const lon=parseFloat(parts[4]);
      // Detect if col2 is limit (small number) or lat (large number)
      let limit=null, rLat, rLon;
      if(parts.length>=5&&Math.abs(lat)<=90&&Math.abs(lon)<=180){ limit=isNaN(limitOrLat)?null:limitOrLat; rLat=lat; rLon=lon; }
      else{ rLat=limitOrLat; rLon=parseFloat(parts[3]); }
      const speeding=parts[5]?.trim().toLowerCase()==='ja'||parts[5]?.trim().toLowerCase()==='yes';
      if(!isNaN(rLat)&&!isNaN(rLon)) rows.push({time,kmh,lat:rLat,lon:rLon,limit,speeding});
    }
    if(!rows.length){ showToast('Geen geldige rijen gevonden.',true); return; }
    const trips=loadTrips();
    const spds=rows.map(r=>r.kmh);
    const name=file.name.replace('.csv','');
    trips.unshift({
      id:Date.now(), name, date:new Date().toISOString(), readings:rows,
      maxSpeed:Math.max(...spds),
      avgSpeed:Math.round(spds.reduce((a,b)=>a+b,0)/spds.length),
      speedingCount:rows.filter(r=>r.speeding).length
    });
    saveTrips(trips);
    renderTripList();
    showToast(`📂 "${name}" geïmporteerd (${rows.length} punten)`,false);
  };
  reader.readAsText(file);
  event.target.value='';
}

// ═══════════════════════════
//  HELPERS
// ═══════════════════════════
function centerMap(){
  if(lastPosition) map.setView([lastPosition.coords.latitude,lastPosition.coords.longitude],16);
  else if(navigator.geolocation) navigator.geolocation.getCurrentPosition(p=>map.setView([p.coords.latitude,p.coords.longitude],14));
}

function exportLog(){
  if(!readings.length){ alert('Nog geen metingen.'); return; }
  const lines=['Tijd,Snelheid (km/h),Limiet (km/h),Lat,Lon,Te snel'];
  readings.forEach(r=>lines.push(`${r.time},${r.kmh},${r.limit??''},${r.lat},${r.lon},${r.speeding?'Ja':'Nee'}`));
  const blob=new Blob([lines.join('\n')],{type:'text/csv'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download=`snelheid_${new Date().toISOString().slice(0,10)}.csv`;
  a.click(); URL.revokeObjectURL(url);
}

if('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(()=>{});
